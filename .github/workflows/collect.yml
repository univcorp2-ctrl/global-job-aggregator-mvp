name: Collect jobs

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Collect jobs
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          FREELANCER_OAUTH_TOKEN: ${{ secrets.FREELANCER_OAUTH_TOKEN }}
          GREENHOUSE_BOARDS: ${{ vars.GREENHOUSE_BOARDS }}
          LEVER_COMPANIES: ${{ vars.LEVER_COMPANIES }}
          ASHBY_BOARDS: ${{ vars.ASHBY_BOARDS }}
          CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
        run: |
          mkdir -p data
          python scripts/collect_once.py --force
      - name: Upload SQLite DB
        uses: actions/upload-artifact@v4
        with:
          name: jobs-sqlite-db
          path: data/jobs.db
          if-no-files-found: error
